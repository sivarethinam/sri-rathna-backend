server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.admin.mobile=9999999999
app.otp.expiry-minutes=10
app.advance-amount=1000
cors.allowed-origins=https://sri-rathna.vercel.app,http://localhost:5173,http://localhost:3000
```

> The key fix is `spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect` — this tells Hibernate to use PostgreSQL without needing a live DB connection at startup.

